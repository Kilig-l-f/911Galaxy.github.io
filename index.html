<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>911星球 · 城市故事</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'PingFang SC', Roboto, sans-serif;
            background: url('images/xingkong.jpg') center/cover no-repeat fixed;
            min-height: 100vh;
            color: #fff;
            padding: 20px 16px 40px;
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(10, 14, 39, 0.5);
            z-index: 0;
            pointer-events: none;
        }
        .container {
            max-width: 960px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            padding: 30px 20px 28px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 36px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.6);
            margin-bottom: 28px;
            position: relative;
            overflow: hidden;
        }
        .header::after {
            content: '';
            position: absolute;
            top: -60%;
            left: -60%;
            width: 220%;
            height: 220%;
            background: radial-gradient(circle at 30% 40%, rgba(255, 215, 0, 0.05), transparent 70%);
            pointer-events: none;
        }
        .header h1 {
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: 8px;
            background: linear-gradient(135deg, #ffd700, #ff8c00, #ffd700);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmerGold 5s linear infinite;
            position: relative;
        }
        @keyframes shimmerGold {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }
        .header .subtitle {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 6px;
            letter-spacing: 4px;
            font-weight: 300;
            font-style: italic;
        }

        .view {
            display: none;
            animation: fadeSlideUp 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .view.active { display: block; }
        @keyframes fadeSlideUp {
            0% { opacity: 0; transform: translateY(24px) scale(0.96); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .nav-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            flex-wrap: wrap;
        }
        .nav-header .back-btn {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #fff;
            padding: 8px 18px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }
        .nav-header .back-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateX(-4px);
        }
        .nav-header .back-btn .arrow { font-size: 1.2rem; }
        .nav-header .title {
            font-size: 1.4rem;
            font-weight: 700;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            min-width: 100px;
        }
        .nav-header .title span { color: #ffd700; }
        .nav-header .badge {
            font-size: 0.75rem;
            background: rgba(255, 255, 255, 0.06);
            padding: 4px 14px;
            border-radius: 30px;
            color: rgba(255, 255, 255, 0.4);
            flex-shrink: 0;
        }

        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px 12px;
            margin-bottom: 16px;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .filter-bar .filter-label {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.3);
            margin-right: 2px;
        }
        .filter-bar .filter-btn {
            padding: 4px 16px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.02);
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .filter-bar .filter-btn:hover {
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
        }
        .filter-bar .filter-btn.active {
            background: #ffd700;
            color: #1a1040;
            font-weight: 600;
            border-color: #ffd700;
        }
        .filter-bar .search-box {
            flex: 1;
            min-width: 120px;
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 0 14px;
            transition: border-color 0.3s;
        }
        .filter-bar .search-box:focus-within {
            border-color: rgba(255, 215, 0, 0.3);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.03);
        }
        .filter-bar .search-box .search-icon {
            color: rgba(255, 255, 255, 0.2);
            font-size: 0.9rem;
            margin-right: 8px;
        }
        .filter-bar .search-box input {
            flex: 1;
            background: none;
            border: none;
            color: #fff;
            padding: 8px 0;
            font-size: 0.85rem;
            outline: none;
            min-width: 60px;
        }
        .filter-bar .search-box input::placeholder {
            color: rgba(255, 255, 255, 0.2);
            font-size: 0.75rem;
        }
        .filter-bar .search-box .clear-btn {
            color: rgba(255, 255, 255, 0.15);
            cursor: pointer;
            font-size: 0.9rem;
            padding: 4px;
            transition: color 0.3s;
            display: none;
        }
        .filter-bar .search-box .clear-btn.visible {
            display: block;
        }
        .filter-bar .search-box .clear-btn:hover {
            color: rgba(255, 255, 255, 0.4);
        }
        .filter-bar .filter-count {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.2);
            white-space: nowrap;
        }

        .province-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 4px 0;
        }
        .province-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 22px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }
        .province-item::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 20% 50%, rgba(255, 215, 0, 0.06), transparent 70%);
            opacity: 0;
            transition: opacity 0.4s;
        }
        .province-item:hover {
            transform: translateX(6px) scale(1.01);
            border-color: rgba(255, 215, 0, 0.2);
            background: rgba(255, 255, 255, 0.07);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        .province-item:hover::before { opacity: 1; }
        .province-item .province-emoji {
            font-size: 1.8rem;
            width: 44px;
            text-align: center;
            flex-shrink: 0;
        }
        .province-item .province-name {
            font-size: 1.1rem;
            font-weight: 600;
            flex: 1;
        }
        .province-item .province-count {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.35);
            background: rgba(255, 255, 255, 0.06);
            padding: 2px 14px;
            border-radius: 30px;
            flex-shrink: 0;
        }
        .province-item .province-arrow {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.2);
            transition: transform 0.3s;
        }
        .province-item:hover .province-arrow {
            transform: translateX(4px);
            color: rgba(255, 215, 0, 0.5);
        }

        .grid-4 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
        }
        .group-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border-radius: 22px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
            text-align: center;
            padding: 24px 12px 20px;
            position: relative;
        }
        .group-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 80%, rgba(255, 215, 0, 0.05), transparent 70%);
            opacity: 0;
            transition: opacity 0.4s;
            pointer-events: none;
        }
        .group-card:hover {
            transform: translateY(-6px) scale(1.02);
            border-color: rgba(255, 215, 0, 0.2);
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.5);
        }
        .group-card:hover::after { opacity: 1; }
        .group-card .group-icon { font-size: 3rem; display: block; margin-bottom: 8px; }
        .group-card .group-name { font-size: 1rem; font-weight: 600; color: rgba(255, 255, 255, 0.9); }
        .group-card .group-count { font-size: 0.7rem; color: rgba(255, 255, 255, 0.35); margin-top: 4px; }

        .city-card {
            display: flex;
            align-items: stretch;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
            position: relative;
            min-height: 120px;
            opacity: 1;
        }
        .city-card:hover {
            transform: translateY(-4px) scale(1.01);
            border-color: rgba(255, 215, 0, 0.2);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
        }
        .city-card.read {
            opacity: 0.55;
            filter: grayscale(0.3);
            border-color: rgba(255, 255, 255, 0.1);
        }
        .city-card.read:hover {
            opacity: 0.7;
            transform: translateY(-2px) scale(1.005);
        }
        .city-card .read-badge {
            position: absolute;
            top: 6px;
            right: 6px;
            background: rgba(255, 215, 0, 0.15);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.55rem;
            color: #ffd700;
            border: 1px solid rgba(255, 215, 0, 0.15);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 2;
            letter-spacing: 0.5px;
            font-weight: 500;
        }
        .city-card.read .read-badge {
            opacity: 1;
        }
        .city-card .city-preview {
            width: 120px;
            min-width: 120px;
            height: 120px;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.03);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .city-card .city-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .city-card .city-preview .preview-emoji {
            font-size: 2.8rem;
            opacity: 0.4;
        }
        .city-card .city-preview .flower-name {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            padding: 2px 6px;
            font-size: 0.55rem;
            color: rgba(255, 255, 255, 0.8);
            text-align: center;
            letter-spacing: 0.5px;
            line-height: 1.4;
        }
        .city-card .city-info {
            flex: 1;
            padding: 10px 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-width: 0;
            overflow: hidden;
            position: relative;
        }
        .city-card .city-info .city-name {
            font-size: 0.75rem;
            font-weight: 600;
            color: rgba(255, 215, 0, 0.6);
            margin-bottom: 2px;
        }
        .city-card .city-info .city-text {
            font-size: 0.78rem;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .city-card .city-info .city-id {
            font-size: 0.6rem;
            color: #ffd700;
            margin-top: 4px;
            font-weight: 500;
            opacity: 0.7;
        }

        .detail-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 20px;
            padding-bottom: 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }
        .detail-header .back-btn {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #fff;
            padding: 8px 18px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }
        .detail-header .back-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateX(-4px);
        }
        .detail-header .title {
            font-size: 1.4rem;
            font-weight: 700;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .detail-header .title span { color: #ffd700; }
        .detail-header .id-badge {
            font-size: 0.75rem;
            background: rgba(255, 215, 0, 0.12);
            border: 1px solid rgba(255, 215, 0, 0.2);
            padding: 4px 14px;
            border-radius: 30px;
            color: #ffd700;
            font-weight: 600;
            letter-spacing: 1px;
            flex-shrink: 0;
        }

        .detail-content {
            display: flex;
            align-items: stretch;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            overflow: hidden;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.3);
            min-height: 200px;
        }
        .detail-content .detail-image {
            width: 280px;
            min-width: 280px;
            height: 280px;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.03);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .detail-content .detail-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .detail-content .detail-image .placeholder {
            font-size: 4rem;
            color: rgba(255, 255, 255, 0.1);
        }
        .detail-content .detail-image .flower-name-detail {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            padding: 6px 14px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.85);
            text-align: center;
            letter-spacing: 1px;
        }
        .detail-content .detail-text {
            flex: 1;
            padding: 24px 28px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            font-size: 1.1rem;
            line-height: 1.8;
            color: rgba(255, 255, 255, 0.85);
            position: relative;
            min-width: 0;
            overflow: hidden;
        }
        .detail-content .detail-text .quote-symbol {
            font-size: 2.4rem;
            color: #ffd700;
            opacity: 0.2;
            line-height: 1;
        }
        .detail-content .detail-text .quote-text {
            font-style: italic;
            margin: 4px 0 10px;
        }
        .detail-content .detail-text .city-label {
            font-style: normal;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 2px;
            margin-top: 4px;
        }
        .detail-content .detail-text .city-id {
            display: inline-block;
            margin-top: 8px;
            font-style: normal;
            font-size: 0.85rem;
            background: rgba(255, 215, 0, 0.08);
            padding: 4px 18px;
            border-radius: 30px;
            color: #ffd700;
            border: 1px solid rgba(255, 215, 0, 0.1);
            align-self: flex-start;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
        }
        .gallery-item {
            aspect-ratio: 1/1;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
            position: relative;
            opacity: 1;
        }
        .gallery-item:hover {
            transform: translateY(-4px) scale(1.02);
            border-color: rgba(255, 215, 0, 0.2);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
        }
        .gallery-item.read {
            opacity: 0.55;
            filter: grayscale(0.3);
            border-color: rgba(255, 255, 255, 0.1);
        }
        .gallery-item.read:hover {
            opacity: 0.7;
            transform: translateY(-2px) scale(1.005);
        }
        .gallery-item .read-badge {
            position: absolute;
            top: 6px;
            right: 6px;
            background: rgba(255, 215, 0, 0.15);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.55rem;
            color: #ffd700;
            border: 1px solid rgba(255, 215, 0, 0.15);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 2;
            letter-spacing: 0.5px;
            font-weight: 500;
        }
        .gallery-item.read .read-badge {
            opacity: 1;
        }
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .gallery-item .placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: rgba(255, 255, 255, 0.1);
        }

        .image-modal {
            position: fixed;
            inset: 0;
            background: rgba(10, 14, 39, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }
        .image-modal.show {
            display: flex;
        }
        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }
        .image-modal .modal-close {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 2001;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #fff;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            font-size: 1.6rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
        }
        .image-modal .modal-close:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: rotate(90deg);
        }
        .image-modal .modal-image {
            max-width: 90%;
            max-height: 85vh;
            border-radius: 24px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.6);
            animation: zoomIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes zoomIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 16, 48, 0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 12px 28px;
            border-radius: 40px;
            border: 1px solid rgba(255, 215, 0, 0.12);
            color: #ffd700;
            font-size: 0.9rem;
            z-index: 999;
            animation: toastIn 0.4s ease, toastOut 0.4s ease 2.8s forwards;
            pointer-events: none;
            white-space: nowrap;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }
        @keyframes toastIn {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px) scale(0.9); }
            100% { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
        }
        @keyframes toastOut {
            0% { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px) scale(0.95); }
        }

        .music-control {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 999;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border-radius: 50px;

        const STORAGE_KEY = 'read_cards_v4';
        const GALLERY_STORAGE_KEY = 'read_gallery_v1';
        const LLY_STORAGE_KEY = 'read_cards_v3';

        function getReadKeys(storageKey) {
            try {
                const data = localStorage.getItem(storageKey);
                return data ? JSON.parse(data) : [];
            } catch { return []; }
        }

        function saveReadKeys(storageKey, keys) {
            localStorage.setItem(storageKey, JSON.stringify(keys));
        }

        function markAsRead(storageKey, key) {
            const keys = getReadKeys(storageKey);
            if (!keys.includes(key)) {
                keys.push(key);
                saveReadKeys(storageKey, keys);
            }
        }

        function isRead(storageKey, key) {
            return getReadKeys(storageKey).includes(key);
        }

        function getCityKey(province, group, cityIndex) {
            return `${province}||${group}||${cityIndex}`;
        }

        function getLLYKey(index) {
            return `lly||${index}`;

                showToast('分组数据不存在');
                return;

            if (!group.cities || !group.cities.length) {
                showToast('该分组暂无投稿');
                return;

            currentGroupName = group.name;

            cityBadge.textContent = `${group.cities.length} 个投稿`;

            searchInput.value = '';
            clearSearch.classList.remove('visible');

            renderCityGrid(provinceName, group);
            switchView('viewCity');
        }

        function renderCityGrid(provinceName, group) {
            const filter = currentFilter;
            const searchTerm = searchInput.value.trim().toLowerCase();

            let filteredCities = group.cities;

            if (filter === 'read') {
                filteredCities = filteredCities.filter((city, idx) => {
                    const key = getCityKey(provinceName, group.name, idx);
                    return isRead(STORAGE_KEY, key);
                });
            } else if (filter === 'unread') {
                filteredCities = filteredCities.filter((city, idx) => {
                    const key = getCityKey(provinceName, group.name, idx);
                    return !isRead(STORAGE_KEY, key);
                });
            }

            if (searchTerm) {
                filteredCities = filteredCities.filter(city => {
                    const nameMatch = city.name.includes(searchTerm);
                    const textMatch = city.text && city.text.includes(searchTerm);
                    const idMatch = city.id && city.id.includes(searchTerm);
                    return nameMatch || textMatch || idMatch;
                });
            }

            const total = group.cities.length;
            const shown = filteredCities.length;
            filterCount.textContent = `${shown} / ${total}`;

            if (searchTerm) clearSearch.classList.add('visible');
            else clearSearch.classList.remove('visible');

            if (filteredCities.length === 0) {
                cityGrid.innerHTML =
                    `<div style="grid-column:1/-1;text-align:center;padding:40px 0;color:rgba(255,255,255,0.2);font-size:0.9rem;">📭 没有符合条件的投稿</div>`;
                return;
            }

            let html = '';
            filteredCities.forEach((city, idx) => {
                const originalIndex = group.cities.indexOf(city);
                const key = getCityKey(provinceName, group.name, originalIndex);
                const read = isRead(STORAGE_KEY, key);

                const imgHtml = city.image ?
                    `<img src="${city.image}" alt="${city.name}" loading="lazy" onerror="this.onerror=null;this.parentElement.innerHTML='<span class=\\'preview-emoji\\'>🏙️</span>';" />` :
                    `<span class="preview-emoji">🏙️</span>`;

                html += `
                    <div class="city-card ${read ? 'read' : ''}" data-index="${originalIndex}" data-type="city">
                        <div class="read-badge">👀 已看</div>
                        <div class="city-preview">${imgHtml}</div>
                        <div class="city-info">
                            <div class="city-name">${city.name}</div>
                            <div class="city-text">${city.text}</div>
                            <div class="city-id">ID: ${city.id || '--'}</div>
                        </div>
                    </div>
                `;
            });
            cityGrid.innerHTML = html;

            document.querySelectorAll('.city-card').forEach(el => {
                el.addEventListener('click', function() {
                    const idx = parseInt(this.dataset.index);
                    openDetailView(provinceName, group, idx);
                });
            });
        }

        function openDetailView(provinceName, group, index) {
            const city = group.cities[index];
            if (!city) return;

            const key = getCityKey(provinceName, group.name, index);
            markAsRead(STORAGE_KEY, key);

            detailTitle.innerHTML = `<span>🏙️</span> ${city.name}`;
            detailIdBadge.textContent = `ID: ${city.id || '--'}`;

            if (city.image) {

        function renderGalleryGrid() {
            const filter = currentGalleryFilter;

            let filtered = GALLERY_IMAGES.map((item, idx) => ({ ...item, index: idx }));

            if (filter === 'read') {
                filtered = filtered.filter(item => {
                    const key = getGalleryKey(item.index);
                    return isRead(GALLERY_STORAGE_KEY, key);
                });
            } else if (filter === 'unread') {
                filtered = filtered.filter(item => {
                    const key = getGalleryKey(item.index);
                    return !isRead(GALLERY_STORAGE_KEY, key);
                });
            }

            const total = GALLERY_IMAGES.length;
            const shown = filtered.length;
            galleryFilterCount.textContent = `${shown} / ${total}`;

                galleryGrid.innerHTML =

                return;
            }

            let html = '';
            filtered.forEach((item) => {
                const idx = item.index;
                const key = getGalleryKey(idx);
                const read = isRead(GALLERY_STORAGE_KEY, key);

                const imgHtml = item.image ?
                    `<img src="${item.image}" alt="评论图片 ${idx+1}" loading="lazy" onerror="this.onerror=null;this.parentElement.innerHTML='<div class=\\'placeholder\\'>🖼️</div>';" />` :

                    </div>

            galleryGrid.innerHTML = html;

            document.querySelectorAll('.gallery-item').forEach(el => {
                el.addEventListener('click', function() {
                    const idx = parseInt(this.dataset.index);

                    if (item && item.image) {
                        const key = getGalleryKey(idx);
                        markAsRead(GALLERY_STORAGE_KEY, key);
                        openImageModal(item.image);
                        renderGalleryGrid();
                    } else {
                        showToast('图片不存在');
                    }
                });
            });

                    const group = province.groups.find(g => g.name === currentGroupName);
                    if (group) renderCityGrid(currentProvince, group);
                } else {
                    renderLLYGrid();
                }
            }
        });

        clearSearch.addEventListener('click', function() {
            searchInput.value = '';
            clearSearch.classList.remove('visible');
            if (viewCity.classList.contains('active')) {
                if (currentProvince && currentGroupCities.length) {
                    const province = PROVINCE_DATA[currentProvince];
                    const group = province.groups.find(g => g.name === currentGroupName);
                    if (group) renderCityGrid(currentProvince, group);
                } else {
                    renderLLYGrid();
                }
            }
            searchInput.focus();
        });

        searchInput.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                if (this.value) {
                    this.value = '';
                    clearSearch.classList.remove('visible');
                    if (viewCity.classList.contains('active')) {
                        if (currentProvince && currentGroupCities.length) {
                            const province = PROVINCE_DATA[currentProvince];
                            const group = province.groups.find(g => g.name === currentGroupName);
                            if (group) renderCityGrid(currentProvince, group);
                        } else {
                            renderLLYGrid();
                        }
                    }
                } else {
                    this.blur();
                }
            }
        });

        // ===== 返回事件 =====
        backToProvince.addEventListener('click', () => switchView('viewProvince'));
        backToProvinceFromGallery.addEventListener('click', () => switchView('viewProvince'));

        backToGroup.addEventListener('click', () => {
            if (currentProvince && PROVINCE_DATA[currentProvince]) openGroupView(currentProvince);
            else switchView('viewProvince');
        });

        backToCity.addEventListener('click', () => {
            if (currentProvince && PROVINCE_DATA[currentProvince] && currentGroupName) {
                const province = PROVINCE_DATA[currentProvince];
                const groupIdx = province.groups.findIndex(g => g.name === currentGroupName);
                if (groupIdx !== -1) openCityView(currentProvince, groupIdx);
                else openGroupView(currentProvince);
            } else {
                openLLYView();
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                if (imageModal.classList.contains('show')) {
                    closeImageModal();
                    return;
                }
                if (viewDetail.classList.contains('active')) backToCity.click();
                else if (viewCity.classList.contains('active')) {
                    if (searchInput.value) {
                        searchInput.value = '';
                        clearSearch.classList.remove('visible');
                        if (currentProvince && currentGroupCities.length) {
                            const province = PROVINCE_DATA[currentProvince];
                            const group = province.groups.find(g => g.name === currentGroupName);
                            if (group) renderCityGrid(currentProvince, group);
                        } else {
                            renderLLYGrid();
                        }
                        return;
                    }
                    backToGroup.click();
                } else if (viewGroup.classList.contains('active')) backToProvince.click();
                else if (viewGallery.classList.contains('active')) backToProvinceFromGallery.click();
            }
        });

        // ===== 启动 =====
        renderProvinces();
        showToast('🌍 911星球 · 探索城市故事');
        console.log('📦 数据加载完成');
        console.log('🖼️ 一些评论共 ' + GALLERY_IMAGES.length + ' 张图片');
        console.log('⭐ LLY专区共 ' + LLY_DATA.length + ' 个投稿');
        console.log('📍 普通省份共 ' + Object.keys(PROVINCE_DATA).length + ' 个');
        console.log('🎵 背景音乐：bgm.mp3/dxy.mp3');
        console.log('🖼️ 背景图片：images/xingkong.jpg');
    </script>

</body>
</html>
